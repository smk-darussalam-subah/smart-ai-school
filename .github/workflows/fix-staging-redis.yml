name: Fix Staging Redis Password (one-shot)

on:
  workflow_dispatch:

jobs:
  fix:
    name: Sync REDIS_PASSWORD prod→staging & restart
    runs-on: ubuntu-latest

    steps:
      - name: Fix via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: appuser
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            set -euo pipefail

            PROD_ENV=/home/appuser/smart-ai-school/infrastructure/docker/.env
            STAGING_ENV=/opt/diis-staging/smart-ai-school/infrastructure/docker/.env.staging
            DOCKER_DIR=/opt/diis-staging/smart-ai-school/infrastructure/docker

            # ── Sync REDIS_PASSWORD prod → staging via Python (aman untuk password dgn special chars) ──
            python3 - "$PROD_ENV" "$STAGING_ENV" <<'PYEOF'
            import sys, re, urllib.parse

            prod_env, staging_env = sys.argv[1], sys.argv[2]

            with open(prod_env) as f:
                prod = dict(line.strip().split('=', 1) for line in f if '=' in line and not line.startswith('#'))

            pw = prod.get('REDIS_PASSWORD', '')
            if not pw:
                print('❌ REDIS_PASSWORD tidak ditemukan di prod .env')
                sys.exit(1)

            enc = urllib.parse.quote(pw, safe='')
            redis_url = f'redis://:{enc}@redis:6379'

            with open(staging_env) as f:
                content = f.read()

            content = re.sub(r'^REDIS_PASSWORD=.*$', f'REDIS_PASSWORD={pw}', content, flags=re.MULTILINE)
            if 'REDIS_PASSWORD=' not in content:
                content += f'\nREDIS_PASSWORD={pw}\n'

            content = re.sub(r'^REDIS_URL=.*$', f'REDIS_URL={redis_url}', content, flags=re.MULTILINE)
            if 'REDIS_URL=' not in content:
                content += f'\nREDIS_URL={redis_url}\n'

            with open(staging_env, 'w') as f:
                f.write(content)

            print(f'✅ REDIS_PASSWORD synced, REDIS_URL updated (pass len={len(pw)})')
            PYEOF

            # ── Restart smk-staging-api dengan env baru ──
            cd "$DOCKER_DIR"
            docker compose -p smk-staging \
              -f docker-compose.yml \
              -f docker-compose.staging.yml \
              --env-file "$STAGING_ENV" \
              up -d --no-deps api

            echo "⏳ Menunggu smk-staging-api healthy..."
            timeout 90 sh -c \
              'until [ "$(docker inspect smk-staging-api --format "{{.State.Health.Status}}" 2>/dev/null)" = "healthy" ]; do
                 echo "  $(docker inspect smk-staging-api --format "{{.State.Status}}" 2>/dev/null)..."
                 sleep 8
              done'

            echo "✅ smk-staging-api healthy!"
            docker logs smk-staging-api --tail 5
