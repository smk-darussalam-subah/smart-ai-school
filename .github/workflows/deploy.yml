name: Deploy

on:
  push:
    branches:
      - staging
      - main

jobs:
  deploy:
    name: Deploy to ${{ github.ref_name == 'main' && 'Production' || 'Staging' }}
    runs-on: ubuntu-latest

    environment:
      name: ${{ github.ref_name == 'main' && 'production' || 'staging' }}
      url: ${{ github.ref_name == 'main' && 'https://smkdarussalamsubah.sch.id' || 'https://staging.smkdarussalamsubah.sch.id' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: appuser
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            set -euo pipefail

            echo "🚀 Deploying branch: ${{ github.ref_name }}"
            cd /home/appuser/smart-ai-school

            # Pull kode terbaru
            git fetch origin
            git checkout ${{ github.ref_name }}
            git pull origin ${{ github.ref_name }}

            # Install dependencies (jika ada yang berubah)
            npm ci --only=production

            # Pull image terbaru
            docker compose pull api web

            # Jalankan database migrations
            docker compose run --rm api npx prisma migrate deploy

            # Restart service dengan zero-downtime (recreate hanya yang berubah)
            docker compose up -d --build --no-deps api web

            # Verifikasi health check
            sleep 15
            curl -f http://localhost:3000/health || (echo "❌ API health check gagal!" && exit 1)

            echo "✅ Deploy berhasil! Branch: ${{ github.ref_name }}"

      - name: Notify deployment success
        if: success()
        run: |
          echo "Deploy berhasil ke ${{ github.ref_name == 'main' && 'Production' || 'Staging' }}"
          # TODO: Tambahkan notifikasi WA via n8n webhook

      - name: Notify deployment failure
        if: failure()
        run: |
          echo "Deploy GAGAL ke ${{ github.ref_name == 'main' && 'Production' || 'Staging' }}"
          # TODO: Tambahkan alert ke WA admin via n8n webhook
