name: Deploy

on:
  push:
    branches:
      - staging
      - main

jobs:
  deploy:
    name: Deploy to ${{ github.ref_name == 'main' && 'Production' || 'Staging' }}
    runs-on: ubuntu-latest

    environment:
      name: ${{ github.ref_name == 'main' && 'production' || 'staging' }}
      url: ${{ github.ref_name == 'main' && 'https://smkdarussalamsubah.sch.id' || 'https://staging.smkdarussalamsubah.sch.id' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: appuser
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            set -euo pipefail

            echo "🚀 Deploying branch: ${{ github.ref_name }}"

            # Pull kode terbaru
            cd /home/appuser/smart-ai-school
            git fetch origin
            git checkout ${{ github.ref_name }}
            git pull origin ${{ github.ref_name }}

            # Semua docker compose dijalankan dari direktori yang benar
            cd /home/appuser/smart-ai-school/infrastructure/docker

            # Build image lokal (api & web pakai build: bukan image: dari registry)
            docker compose build --no-cache api web

            # Restart service dengan image baru
            docker compose up -d --no-deps api web

            # Jalankan database migrations di dalam container yang sudah running.
            # Alasan pakai docker exec (bukan docker compose run --rm):
            #   - Container smk-api sudah di smk-network → bisa reach postgres
            #   - DATABASE_URL sudah ter-set benar dari docker-compose environment
            #   - docker compose run ephemeral bisa gagal parse DATABASE_URL
            #     jika POSTGRES_PASSWORD mengandung karakter khusus (@, #, dll)
            # Tunggu container benar-benar up sebelum exec
            echo "⏳ Menunggu smk-api start..."
            timeout 60 sh -c 'until docker exec smk-api echo ok 2>/dev/null; do sleep 2; done'
            docker exec smk-api \
              sh -c "cd /app/packages/database && npx prisma migrate deploy" \
              || (echo "❌ Migration gagal!" && exit 1)
            echo "✅ Migration selesai"

            # Verifikasi health check — API tidak expose port ke host (security),
            # gunakan docker exec untuk cek dari dalam container
            sleep 10
            docker exec smk-api curl -sf http://localhost:3001/health \
              || (echo "❌ API health check gagal!" && exit 1)

            echo "✅ Deploy berhasil! Branch: ${{ github.ref_name }}"

      - name: Notify deployment success
        if: success()
        run: |
          echo "Deploy berhasil ke ${{ github.ref_name == 'main' && 'Production' || 'Staging' }}"
          # TODO: Tambahkan notifikasi WA via n8n webhook

      - name: Notify deployment failure
        if: failure()
        run: |
          echo "Deploy GAGAL ke ${{ github.ref_name == 'main' && 'Production' || 'Staging' }}"
          # TODO: Tambahkan alert ke WA admin via n8n webhook
