name: Deploy

on:
  push:
    branches:
      - staging
      - main

jobs:
  deploy:
    name: Deploy to ${{ github.ref_name == 'main' && 'Production' || 'Staging' }}
    runs-on: ubuntu-latest

    environment:
      name: ${{ github.ref_name == 'main' && 'production' || 'staging' }}
      url: ${{ github.ref_name == 'main' && 'https://smkdarussalamsubah.sch.id' || 'https://staging.smkdarussalamsubah.sch.id' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: appuser
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            set -euo pipefail

            BRANCH="${{ github.ref_name }}"
            echo "🚀 Deploying branch: ${BRANCH}"

            # ── Tentukan working-dir dan env-file berdasarkan branch ──────────
            if [ "$BRANCH" = "main" ]; then
              WORK_DIR=/home/appuser/smart-ai-school
              ENV_FILE=.env
              COMPOSE_ARGS="-f docker-compose.yml"
              COMPOSE_PROJECT=""
              API_CONTAINER=smk-api
              WEB_CONTAINER=smk-web
            else
              # Staging: direktori terpisah, DB terpisah, compose project terpisah
              WORK_DIR=/opt/diis-staging/smart-ai-school
              ENV_FILE=.env.staging
              COMPOSE_ARGS="-p smk-staging -f docker-compose.yml -f docker-compose.staging.yml"
              COMPOSE_PROJECT="-p smk-staging"
              API_CONTAINER=smk-staging-api
              WEB_CONTAINER=smk-staging-web
            fi

            # ── Pull kode terbaru di working-dir yang benar ───────────────────
            # PENTING: staging menggunakan direktori /opt/diis-staging/ terpisah
            # sehingga git checkout staging TIDAK menyentuh working-tree produksi.
            cd "$WORK_DIR"
            git fetch origin
            git checkout "$BRANCH"
            git pull origin "$BRANCH"

            # Masuk ke direktori docker (relatif terhadap WORK_DIR)
            cd "$WORK_DIR/infrastructure/docker"

            # ── Patch env-file: tulis DATABASE_URL dengan password URL-encoded ──
            _PW=$(grep '^POSTGRES_PASSWORD=' "$ENV_FILE" | head -1 | cut -d= -f2-)
            _USER=$(grep '^POSTGRES_USER=' "$ENV_FILE" | head -1 | cut -d= -f2- || echo 'smk_admin')
            _DB=$(grep '^POSTGRES_DB=' "$ENV_FILE" | head -1 | cut -d= -f2- || echo 'smk_db')
            _ENC=$(printf '%s' "$_PW" | python3 -c "import sys,urllib.parse; print(urllib.parse.quote(sys.stdin.read(),safe=''),end='')")
            _URL="postgresql://${_USER}:${_ENC}@postgres:5432/${_DB}"
            if grep -q '^DATABASE_URL=' "$ENV_FILE" 2>/dev/null; then
              sed -i "s|^DATABASE_URL=.*|DATABASE_URL=${_URL}|" "$ENV_FILE"
            else
              printf '\nDATABASE_URL=%s\n' "${_URL}" >> "$ENV_FILE"
            fi
            echo "✅ DATABASE_URL → postgresql://${_USER}:***@postgres:5432/${_DB}"

            # ── Patch env-file: tulis REDIS_URL dengan password URL-encoded ────
            _RPW=$(grep '^REDIS_PASSWORD=' "$ENV_FILE" | head -1 | cut -d= -f2- || echo '')
            if [ -n "$_RPW" ]; then
              _RENC=$(printf '%s' "$_RPW" | python3 -c "import sys,urllib.parse; print(urllib.parse.quote(sys.stdin.read(),safe=''),end='')")
              _RURL="redis://:${_RENC}@redis:6379"
            else
              _RURL="redis://redis:6379"
            fi
            if grep -q '^REDIS_URL=' "$ENV_FILE" 2>/dev/null; then
              sed -i "s|^REDIS_URL=.*|REDIS_URL=${_RURL}|" "$ENV_FILE"
            else
              printf '\nREDIS_URL=%s\n' "${_RURL}" >> "$ENV_FILE"
            fi
            echo "✅ REDIS_URL → redis://:***@redis:6379"

            if [ "$BRANCH" = "staging" ]; then
              # ── Patch .env.staging: tulis STAGING_DATABASE_URL ──────────────
              # STAGING_DATABASE_URL selalu menunjuk smk_staging_db (bukan smk_db).
              _STAGING_URL="postgresql://${_USER}:${_ENC}@postgres:5432/smk_staging_db"
              if grep -q '^STAGING_DATABASE_URL=' "$ENV_FILE" 2>/dev/null; then
                sed -i "s|^STAGING_DATABASE_URL=.*|STAGING_DATABASE_URL=${_STAGING_URL}|" "$ENV_FILE"
              else
                printf '\nSTAGING_DATABASE_URL=%s\n' "${_STAGING_URL}" >> "$ENV_FILE"
              fi
              echo "✅ STAGING_DATABASE_URL → postgresql://${_USER}:***@postgres:5432/smk_staging_db"

              # ── Init staging DB (idempoten) ─────────────────────────────────
              echo "🔧 Memastikan smk_staging_db siap..."
              docker compose $COMPOSE_ARGS --env-file "$ENV_FILE" \
                run --rm db-init-staging
              echo "✅ smk_staging_db siap"
            fi

            # ── Build image (api & web) ───────────────────────────────────────
            docker compose $COMPOSE_ARGS --env-file "$ENV_FILE" \
              build --no-cache api web

            # ── Deploy: restart api & web dengan image baru ──────────────────
            # --no-deps: jangan start postgres/redis/keycloak (sudah running dari prod stack)
            # Migrasi Prisma dijalankan OTOMATIS di dalam CMD container api (start.sh):
            #   - Staging: migrate ke smk_staging_db (guardrail N-20 aktif)
            #   - Prod:    migrate ke smk_db
            docker compose $COMPOSE_ARGS --env-file "$ENV_FILE" \
              up -d --no-deps api web

            # ── Tunggu api healthy ────────────────────────────────────────────
            echo "⏳ Menunggu ${API_CONTAINER} healthy (migrasi + NestJS startup)..."
            timeout 150 sh -c \
              "until [ \"\$(docker inspect ${API_CONTAINER} --format '{{.State.Health.Status}}' 2>/dev/null)\" = \"healthy\" ]; do
                 STATUS=\$(docker inspect ${API_CONTAINER} --format '{{.State.Status}}' 2>/dev/null)
                 echo \"  status: \$STATUS, health: \$(docker inspect ${API_CONTAINER} --format '{{.State.Health.Status}}' 2>/dev/null)\"
                 sleep 10
              done" \
              || (
                echo "❌ ${API_CONTAINER} tidak healthy setelah 150s. Log terakhir:"
                docker logs "${API_CONTAINER}" --tail 50 2>&1
                exit 1
              )
            echo "✅ ${API_CONTAINER} healthy!"

            if [ "$BRANCH" = "main" ]; then
              # ── Prod: reload nginx ──────────────────────────────────────────
              docker compose $COMPOSE_ARGS --env-file "$ENV_FILE" \
                up -d --no-deps nginx
              docker exec smk-nginx nginx -s reload 2>/dev/null || true
              echo "✅ nginx up & config reloaded"
            fi

            echo "✅ Deploy berhasil! Branch: ${BRANCH} → ${API_CONTAINER} / ${WEB_CONTAINER}"

      - name: Notify deployment success
        if: success()
        run: |
          echo "Deploy berhasil ke ${{ github.ref_name == 'main' && 'Production' || 'Staging' }}"
          # TODO: Tambahkan notifikasi WA via n8n webhook

      - name: Notify deployment failure
        if: failure()
        run: |
          echo "Deploy GAGAL ke ${{ github.ref_name == 'main' && 'Production' || 'Staging' }}"
          # TODO: Tambahkan alert ke WA admin via n8n webhook
