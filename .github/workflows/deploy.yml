name: Deploy

on:
  push:
    branches:
      - staging
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to ${{ github.ref_name == 'main' && 'Production' || 'Staging' }}
    runs-on: ubuntu-latest

    environment:
      name: ${{ github.ref_name == 'main' && 'production' || 'staging' }}
      url: ${{ github.ref_name == 'main' && 'https://smkdarussalamsubah.sch.id' || 'https://staging.smkdarussalamsubah.sch.id' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: appuser
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            set -euo pipefail

            BRANCH="${{ github.ref_name }}"
            echo "🚀 Deploying branch: ${BRANCH}"

            # ── Tentukan working-dir dan env-file berdasarkan branch ──────────
            if [ "$BRANCH" = "main" ]; then
              WORK_DIR=/home/appuser/smart-ai-school
              ENV_FILE=.env
              COMPOSE_ARGS="-f docker-compose.yml"
              COMPOSE_PROJECT=""
              API_CONTAINER=smk-api
              WEB_CONTAINER=smk-web
            else
              # Staging: direktori terpisah, DB terpisah, compose project terpisah
              WORK_DIR=/opt/diis-staging/smart-ai-school
              ENV_FILE=.env.staging
              COMPOSE_ARGS="-p smk-staging -f docker-compose.yml -f docker-compose.staging.yml"
              COMPOSE_PROJECT="-p smk-staging"
              API_CONTAINER=smk-staging-api
              WEB_CONTAINER=smk-staging-web
            fi

            # ── Pull kode terbaru di working-dir yang benar ───────────────────
            # PENTING: staging menggunakan direktori /opt/diis-staging/ terpisah
            # sehingga git checkout staging TIDAK menyentuh working-tree produksi.
            #
            # git stash: VPS working-tree mungkin punya perubahan lokal (mis:
            # nginx.conf hasil copy dari staging deploy sebelumnya). Stash
            # memastikan git pull selalu fast-forward tanpa conflict.
            cd "$WORK_DIR"
            git fetch origin
            git checkout "$BRANCH"
            git stash --include-untracked 2>/dev/null || true
            git pull origin "$BRANCH"

            # Masuk ke direktori docker (relatif terhadap WORK_DIR)
            cd "$WORK_DIR/infrastructure/docker"

            # ── Patch env-file: tulis DATABASE_URL dengan password URL-encoded ──
            _PW=$(grep '^POSTGRES_PASSWORD=' "$ENV_FILE" | head -1 | cut -d= -f2-)
            _USER=$(grep '^POSTGRES_USER=' "$ENV_FILE" | head -1 | cut -d= -f2- || echo 'smk_admin')
            _DB=$(grep '^POSTGRES_DB=' "$ENV_FILE" | head -1 | cut -d= -f2- || echo 'smk_db')
            _ENC=$(printf '%s' "$_PW" | python3 -c "import sys,urllib.parse; print(urllib.parse.quote(sys.stdin.read(),safe=''),end='')")
            _URL="postgresql://${_USER}:${_ENC}@postgres:5432/${_DB}"
            if grep -q '^DATABASE_URL=' "$ENV_FILE" 2>/dev/null; then
              sed -i "s|^DATABASE_URL=.*|DATABASE_URL=${_URL}|" "$ENV_FILE"
            else
              printf '\nDATABASE_URL=%s\n' "${_URL}" >> "$ENV_FILE"
            fi
            echo "✅ DATABASE_URL → postgresql://${_USER}:***@postgres:5432/${_DB}"

            # ── Patch env-file: tulis REDIS_URL dengan password URL-encoded ────
            _RPW=$(grep '^REDIS_PASSWORD=' "$ENV_FILE" | head -1 | cut -d= -f2- || echo '')
            if [ -n "$_RPW" ]; then
              _RENC=$(printf '%s' "$_RPW" | python3 -c "import sys,urllib.parse; print(urllib.parse.quote(sys.stdin.read(),safe=''),end='')")
              _RURL="redis://:${_RENC}@redis:6379"
            else
              _RURL="redis://redis:6379"
            fi
            if grep -q '^REDIS_URL=' "$ENV_FILE" 2>/dev/null; then
              sed -i "s|^REDIS_URL=.*|REDIS_URL=${_RURL}|" "$ENV_FILE"
            else
              printf '\nREDIS_URL=%s\n' "${_RURL}" >> "$ENV_FILE"
            fi
            echo "✅ REDIS_URL → redis://:***@redis:6379"

            if [ "$BRANCH" = "staging" ]; then
              # ── Patch .env.staging: tulis STAGING_DATABASE_URL ──────────────
              # STAGING_DATABASE_URL selalu menunjuk smk_staging_db (bukan smk_db).
              _STAGING_URL="postgresql://${_USER}:${_ENC}@postgres:5432/smk_staging_db"
              if grep -q '^STAGING_DATABASE_URL=' "$ENV_FILE" 2>/dev/null; then
                sed -i "s|^STAGING_DATABASE_URL=.*|STAGING_DATABASE_URL=${_STAGING_URL}|" "$ENV_FILE"
              else
                printf '\nSTAGING_DATABASE_URL=%s\n' "${_STAGING_URL}" >> "$ENV_FILE"
              fi
              echo "✅ STAGING_DATABASE_URL → postgresql://${_USER}:***@postgres:5432/smk_staging_db"

              # ── Pastikan smk-staging-net ada (external di compose.staging.yml) ──
              # Jaringan ini dibuat di luar compose; compose tidak akan membuatnya.
              # docker network create idempoten via kondisi if.
              if ! docker network inspect smk-staging-net >/dev/null 2>&1; then
                docker network create smk-staging-net
                echo "✅ smk-staging-net created"
              else
                echo "✅ smk-staging-net already exists"
              fi

              # ── Init staging DB (idempoten) ─────────────────────────────────
              echo "🔧 Memastikan smk_staging_db siap..."
              docker compose $COMPOSE_ARGS --env-file "$ENV_FILE" \
                run --rm db-init-staging
              echo "✅ smk_staging_db siap"
            fi

            # ── Build image (api, web, api-migrate) ──────────────────────────
            # api-migrate harus ikut di-build agar migration files selalu up-to-date.
            # BUILD_ARG_API_URL: Next.js rewrites() resolve process.env.API_URL at build
            # time (frozen into routes-manifest.json in standalone mode). Staging MUST
            # point to smk-staging-api:3001 (not prod api:3001) so SSR proxy works.
            if [ "$BRANCH" = "staging" ]; then
              BUILD_ARG_API="--build-arg API_URL=http://smk-staging-api:3001"
            else
              BUILD_ARG_API=""
            fi

            # shellcheck disable=SC2086
            docker compose $COMPOSE_ARGS --env-file "$ENV_FILE" \
              build --no-cache $BUILD_ARG_API api web api-migrate

            # ── Step 1: Jalankan Prisma migration (one-shot, DDL terpisah dari runtime) ──
            # api-migrate: service dengan profile migrate — jalankan prisma migrate deploy lalu exit.
            # Memisahkan hak DDL (CREATE/ALTER) dari runtime API container.
            # --no-deps wajib di staging: api-migrate.depends_on=postgres dari base compose
            # akan membuat container smk-postgres baru → conflict dengan prod container.
            # Postgres sudah running (prod stack) dan reachable via smk-network.
            echo "🔄 Running Prisma migration (${BRANCH})..."
            docker compose $COMPOSE_ARGS --env-file "$ENV_FILE" --profile migrate \
              run --rm --no-deps api-migrate
            echo "✅ Migration selesai"

            # ── Step 2: Deploy api & web dengan image baru ─────────────────────
            # --no-deps: jangan start postgres/redis/keycloak (sudah running dari prod stack)
            docker compose $COMPOSE_ARGS --env-file "$ENV_FILE" \
              up -d --no-deps api web

            # ── Tunggu api healthy ────────────────────────────────────────────
            echo "⏳ Menunggu ${API_CONTAINER} healthy (NestJS startup)..."
            timeout 150 sh -c \
              "until [ \"\$(docker inspect ${API_CONTAINER} --format '{{.State.Health.Status}}' 2>/dev/null)\" = \"healthy\" ]; do
                 STATUS=\$(docker inspect ${API_CONTAINER} --format '{{.State.Status}}' 2>/dev/null)
                 echo \"  status: \$STATUS, health: \$(docker inspect ${API_CONTAINER} --format '{{.State.Health.Status}}' 2>/dev/null)\"
                 sleep 10
              done" \
              || (
                echo "❌ ${API_CONTAINER} tidak healthy setelah 150s. Log terakhir:"
                docker logs "${API_CONTAINER}" --tail 50 2>&1
                exit 1
              )
            echo "✅ ${API_CONTAINER} healthy!"

            # ── Recreate nginx (ALL branches) ─────────────────────────────
            # --force-recreate diperlukan karena git mengganti file nginx.conf
            # dengan inode baru (bukan modifikasi in-place). Tanpa recreate,
            # container nginx masih membaca inode lama → perubahan nginx.conf
            # tidak aktif meski nginx -s reload berhasil.
            #
            # FIX (2026-07-11): Sebelumnya hanya dijalankan untuk branch main.
            # Staging deploy TIDAK pernah recreate nginx → server block staging-api
            # tidak pernah di-load.
            #
            # PENTING: nginx adalah container PRODUKSI (smk-nginx) yang di-share
            # oleh staging via smk-staging-net. Bind mount nginx.conf berasal dari
            # production working dir (/home/appuser/smart-ai-school/infrastructure/
            # nginx/nginx.conf). Staging deploy menaruh code di /opt/diis-staging/
            # sehingga nginx.conf staging TIDAK terlihat oleh container nginx prod.
            #
            # Solusi: copy nginx.conf dari staging working dir ke prod working dir,
            # lalu recreate nginx dari prod compose context.
            PROD_WORK_DIR=/home/appuser/smart-ai-school
            PROD_DOCKER_DIR="$PROD_WORK_DIR/infrastructure/docker"
            PROD_NGINX_DIR="$PROD_WORK_DIR/infrastructure/nginx"

            if [ "$BRANCH" = "staging" ]; then
              # Copy nginx.conf staging ke prod working dir agar bind mount picks it up
              cp "$WORK_DIR/infrastructure/nginx/nginx.conf" "$PROD_NGINX_DIR/nginx.conf"
              echo "✅ nginx.conf staging → prod working dir copied"
            fi

            # Recreate nginx dari PRODUCTION compose context (container name: smk-nginx)
            cd "$PROD_DOCKER_DIR"
            docker compose -f docker-compose.yml --env-file .env \
              up -d --no-deps --force-recreate nginx
            cd "$WORK_DIR/infrastructure/docker"
            echo "✅ nginx recreated (prod context, fresh bind mount) — branch: ${BRANCH}"

            # ── Re-heal staging: nginx ↔ smk-staging-net ────────────────────
            # recreate nginx melepasnya dari smk-staging-net (jaringan staging
            # SENGAJA di luar compose prod agar deploy main tak bergantung infra
            # staging). Sambung ulang best-effort: || true agar deploy tak
            # pernah gagal walau staging-net belum ada. Idempoten.
            if docker network inspect smk-staging-net >/dev/null 2>&1; then
              docker network connect smk-staging-net smk-nginx 2>/dev/null \
                && echo "✅ nginx ↔ smk-staging-net reconnected" \
                || echo "ℹ️ nginx sudah tersambung ke smk-staging-net (atau dilewati)"
              docker exec smk-nginx nginx -s reload 2>/dev/null \
                && echo "✅ nginx reloaded" || true
            else
              echo "ℹ️ smk-staging-net tidak ada — lewati re-heal staging"
            fi

            echo "✅ Deploy berhasil! Branch: ${BRANCH} → ${API_CONTAINER} / ${WEB_CONTAINER}"

      - name: Notify deployment success
        if: success()
        run: |
          echo "Deploy berhasil ke ${{ github.ref_name == 'main' && 'Production' || 'Staging' }}"
          # TODO: Tambahkan notifikasi WA via n8n webhook

      - name: Notify deployment failure
        if: failure()
        run: |
          echo "Deploy GAGAL ke ${{ github.ref_name == 'main' && 'Production' || 'Staging' }}"
          # TODO: Tambahkan alert ke WA admin via n8n webhook
