name: Deploy

on:
  push:
    branches:
      - staging
      - main

jobs:
  deploy:
    name: Deploy to ${{ github.ref_name == 'main' && 'Production' || 'Staging' }}
    runs-on: ubuntu-latest

    environment:
      name: ${{ github.ref_name == 'main' && 'production' || 'staging' }}
      url: ${{ github.ref_name == 'main' && 'https://smkdarussalamsubah.sch.id' || 'https://staging.smkdarussalamsubah.sch.id' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: appuser
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            set -euo pipefail

            echo "🚀 Deploying branch: ${{ github.ref_name }}"

            # Pull kode terbaru
            cd /home/appuser/smart-ai-school
            git fetch origin
            git checkout ${{ github.ref_name }}
            git pull origin ${{ github.ref_name }}

            # Semua docker compose dijalankan dari direktori yang benar
            cd /home/appuser/smart-ai-school/infrastructure/docker

            # ── Patch .env: tulis DATABASE_URL dengan password URL-encoded ──────────
            # POSTGRES_PASSWORD di .env bisa mengandung @ atau # yang merusak URL.
            # Gunakan python3 via stdin pipe — tidak butuh heredoc, YAML-safe.
            _PW=$(grep '^POSTGRES_PASSWORD=' .env | head -1 | cut -d= -f2-)
            _USER=$(grep '^POSTGRES_USER=' .env | head -1 | cut -d= -f2- || echo 'smk_admin')
            _DB=$(grep '^POSTGRES_DB=' .env | head -1 | cut -d= -f2- || echo 'smk_db')
            _ENC=$(printf '%s' "$_PW" | python3 -c "import sys,urllib.parse; print(urllib.parse.quote(sys.stdin.read(),safe=''),end='')")
            _URL="postgresql://${_USER}:${_ENC}@postgres:5432/${_DB}"
            if grep -q '^DATABASE_URL=' .env 2>/dev/null; then
              sed -i "s|^DATABASE_URL=.*|DATABASE_URL=${_URL}|" .env
            else
              printf '\nDATABASE_URL=%s\n' "${_URL}" >> .env
            fi
            echo "✅ DATABASE_URL → postgresql://${_USER}:***@postgres:5432/${_DB}"

            # Build image lokal (api & web pakai build: bukan image: dari registry)
            docker compose build --no-cache api web

            # Restart service dengan image baru.
            # Migrasi Prisma dijalankan OTOMATIS di dalam CMD container api:
            #   sh -c "cd /app/packages/database && prisma migrate deploy && exec node ..."
            # Sehingga container tidak akan healthy sampai migrasi selesai.
            docker compose up -d --no-deps api web

            # Tunggu smk-api benar-benar healthy (migrasi + NestJS startup).
            # Healthcheck docker-compose: curl http://localhost:3001/health
            # interval=30s, timeout=10s, retries=3 → max wait ~120s.
            echo "⏳ Menunggu smk-api healthy (migrasi + NestJS startup)..."
            timeout 150 sh -c \
              'until [ "$(docker inspect smk-api --format "{{.State.Health.Status}}" 2>/dev/null)" = "healthy" ]; do
                 STATUS=$(docker inspect smk-api --format "{{.State.Status}}" 2>/dev/null)
                 echo "  status: $STATUS, health: $(docker inspect smk-api --format \"{{.State.Health.Status}}\" 2>/dev/null)"
                 sleep 10
              done' \
              || (
                echo "❌ smk-api tidak healthy setelah 150s. Log terakhir:"
                docker logs smk-api --tail 50 2>&1
                exit 1
              )
            echo "✅ smk-api healthy!"

            echo "✅ Deploy berhasil! Branch: ${{ github.ref_name }}"

      - name: Notify deployment success
        if: success()
        run: |
          echo "Deploy berhasil ke ${{ github.ref_name == 'main' && 'Production' || 'Staging' }}"
          # TODO: Tambahkan notifikasi WA via n8n webhook

      - name: Notify deployment failure
        if: failure()
        run: |
          echo "Deploy GAGAL ke ${{ github.ref_name == 'main' && 'Production' || 'Staging' }}"
          # TODO: Tambahkan alert ke WA admin via n8n webhook
