name: CI Pipeline

on:
  pull_request:
    branches: [develop, staging, main]
  push:
    branches: [develop]

jobs:
  # ── Lint & Type Check ──────────────────────────────────────────────────────
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        # Prisma client types (termasuk $queryRawUnsafe) hanya tersedia
        # setelah `prisma generate`. Tanpa ini, type-check di apps/api gagal
        # karena PrismaHealthIndicator.pingCheck() butuh structural type
        # PrismaClientSQL dengan method $queryRawUnsafe.
        run: npm run db:generate

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

  # ── Unit Tests ─────────────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint-and-typecheck

    # Env vars di job level agar tersedia untuk SEMUA steps termasuk
    # subproses yang dipanggil Turborepo (globalEnv di turbo.json pun
    # sudah mendeklarasikan vars ini, tapi job-level adalah safety net).
    env:
      DATABASE_URL: postgresql://smk_test:smk_test_password@localhost:5432/smk_test
      REDIS_URL: redis://localhost:6379
      NODE_ENV: test
      KEYCLOAK_URL: http://localhost:8080
      KEYCLOAK_REALM: diis

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: smk_test
          POSTGRES_USER: smk_test
          POSTGRES_PASSWORD: smk_test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup test database
        run: |
          npm run db:generate
          # prisma migrate deploy hanya menerapkan migrasi pending — tidak ada seed step.
          # --skip-seed bukan flag yang valid untuk migrate deploy (hanya untuk migrate dev).
          npm run db:migrate

      # Menjalankan semua test di semua packages via Turborepo:
      #   - packages/auth: unit tests (mock jwks-rsa + jsonwebtoken) — ≥70% coverage enforced
      #   - apps/api: integration tests NestJS (KeycloakGuard, ZodPipe)
      #   - apps/web: belum ada test (Tahap 1)
      - name: Run tests (semua packages)
        # turbo run test -- --coverage (Turbo v2: '--' memisahkan flag turbo vs Jest)
        run: npm run test:ci

      - name: Upload coverage (semua packages)
        uses: codecov/codecov-action@v4
        if: always()
        with:
          fail_ci_if_error: false
          # Coverage files dari semua packages
          files: |
            packages/auth/coverage/lcov.info
            apps/api/coverage/lcov.info

  # ── Build Check ────────────────────────────────────────────────────────────
  build:
    name: Build Check
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Build all packages
        run: npm run build
