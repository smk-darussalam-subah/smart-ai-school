name: Fix Staging NEXTAUTH_URL

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Fix NEXTAUTH_URL and restart staging web
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: appuser
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            set -euo pipefail

            ENV_FILE=/opt/diis-staging/smart-ai-school/infrastructure/docker/.env.staging

            if [ ! -f "$ENV_FILE" ]; then
              echo "❌ .env.staging tidak ditemukan di $ENV_FILE"
              exit 1
            fi

            echo "📋 Current STAGING_WEB_URL:"
            grep -i STAGING_WEB_URL "$ENV_FILE" || echo "(tidak ada)"

            echo "🔧 Menambah/mengupdate STAGING_WEB_URL..."
            if grep -q '^STAGING_WEB_URL=' "$ENV_FILE"; then
              sed -i 's|^STAGING_WEB_URL=.*|STAGING_WEB_URL=https://staging.smkdarussalamsubah.sch.id|' "$ENV_FILE"
            else
              echo 'STAGING_WEB_URL=https://staging.smkdarussalamsubah.sch.id' >> "$ENV_FILE"
            fi

            echo "✅ STAGING_WEB_URL updated:"
            grep STAGING_WEB_URL "$ENV_FILE"

            echo "🔄 Restart staging web container..."
            cd /opt/diis-staging/smart-ai-school/infrastructure/docker
            docker compose -p smk-staging -f docker-compose.yml -f docker-compose.staging.yml \
              --env-file .env.staging up -d --no-deps web

            echo "✅ Staging web restarted. NEXTAUTH_URL sekarang staging."