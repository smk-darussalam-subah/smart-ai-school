# =============================================================================
# Docker Compose — Smart AI School (SMK Darussalam Subah)
# Domain: smkdarussalamsubah.sch.id
# Semua service berjalan dalam Docker network internal
# Hanya Nginx yang terhubung ke internet (port 80/443)
# =============================================================================

version: '3.8'

networks:
  smk-network:
    driver: bridge
    name: smk-network

volumes:
  postgres_data:
  redis_data:
  keycloak_data:
  n8n_data:
  ollama_data:
  metabase_data:
  uptime_data:
  prometheus_data:
  grafana_data:
  minio_data:
  backup_bin:      # Persistent volume untuk mc binary (agar tidak re-download setiap restart)

services:

  # ─── DATABASE ─────────────────────────────────────────────────────────────

  postgres:
    image: pgvector/pgvector:pg16
    container_name: smk-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-smk_db}
      POSTGRES_USER: ${POSTGRES_USER:-smk_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/01-init-db.sql:ro
    # ports tidak dimapping — aksesibel hanya via Docker network internal.
    # Dev lokal: gunakan docker-compose.dev.yml atau SSH tunnel ke VPS.
    networks:
      - smk-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-smk_admin} -d ${POSTGRES_DB:-smk_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ─── CACHE & QUEUE ────────────────────────────────────────────────────────

  redis:
    image: redis:7-alpine
    container_name: smk-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    # ports tidak dimapping — aksesibel hanya via Docker network internal.
    # Dev lokal: gunakan docker-compose.dev.yml atau SSH tunnel ke VPS.
    volumes:
      - redis_data:/data
    networks:
      - smk-network
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── AUTHENTICATION ───────────────────────────────────────────────────────

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: smk-keycloak
    restart: unless-stopped
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-smk_db}
      KC_DB_USERNAME: ${POSTGRES_USER:-smk_admin}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD}
      KC_DB_SCHEMA: keycloak
      KEYCLOAK_ADMIN: ${KC_ADMIN_USER:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KC_ADMIN_PASSWORD}
      # Dev: HTTP only, no proxy, auto hostname detection
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_HTTP_ENABLED: "true"
      KC_HTTP_PORT: "8080"
      KC_LOG_LEVEL: INFO
    # --import-realm: otomatis import realm-diis.json saat container pertama kali start
    # start-dev: mode development — lebih toleran, tidak butuh HTTPS
    command: start-dev --import-realm
    ports:
      - "8080:8080"
    volumes:
      - keycloak_data:/opt/keycloak/data
      - ../keycloak:/opt/keycloak/data/import:ro
    networks:
      - smk-network
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      # Keycloak 24 ubi9-micro image tidak punya curl/wget/bash.
      # Gunakan /proc/net/tcp6 untuk verifikasi port 8080 (0x1F90) listening.
      # tcp6 dipakai karena Keycloak 24 default listen di IPv6 stack.
      test: ["CMD-SHELL", "cat /proc/net/tcp6 2>/dev/null | grep -q ':1F90 ' || cat /proc/net/tcp 2>/dev/null | grep -q ':1F90 '"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  # ─── AUTOMATION ENGINE ────────────────────────────────────────────────────

  n8n:
    image: n8nio/n8n:latest
    container_name: smk-n8n
    restart: unless-stopped
    environment:
      N8N_HOST: n8n.smkdarussalamsubah.sch.id
      N8N_PORT: 5678
      N8N_PROTOCOL: https
      WEBHOOK_URL: https://n8n.smkdarussalamsubah.sch.id/
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER:-admin}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD}
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB:-smk_db}
      DB_POSTGRESDB_USER: ${POSTGRES_USER:-smk_admin}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_POSTGRESDB_SCHEMA: n8n
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      GENERIC_TIMEZONE: Asia/Jakarta
      TZ: Asia/Jakarta
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - smk-network
    depends_on:
      postgres:
        condition: service_healthy

  # ─── AI LOKAL ─────────────────────────────────────────────────────────────

  ollama:
    image: ollama/ollama:latest
    container_name: smk-ollama
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - smk-network
    # Uncomment jika VPS punya GPU:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  # ─── ANALYTICS DASHBOARD ──────────────────────────────────────────────────

  metabase:
    image: metabase/metabase:v0.49.10
    container_name: smk-metabase
    restart: unless-stopped
    environment:
      MB_DB_TYPE: postgres
      MB_DB_HOST: postgres
      MB_DB_PORT: 5432
      MB_DB_DBNAME: ${POSTGRES_DB:-smk_db}
      MB_DB_USER: ${POSTGRES_USER:-smk_admin}
      MB_DB_PASS: ${POSTGRES_PASSWORD}
      MB_DB_SCHEMA: metabase
      MB_SITE_URL: https://analytics.smkdarussalamsubah.sch.id
      JAVA_TIMEZONE: Asia/Jakarta
    volumes:
      - metabase_data:/metabase-data
    networks:
      - smk-network
    depends_on:
      postgres:
        condition: service_healthy

  # ─── FILE STORAGE ─────────────────────────────────────────────────────────

  minio:
    image: minio/minio:latest
    container_name: smk-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-smkadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_SITE_NAME: smk-darussalam-subah
    volumes:
      - minio_data:/data
    networks:
      - smk-network

  # ─── MONITORING ───────────────────────────────────────────────────────────

  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: smk-uptime-kuma
    restart: unless-stopped
    volumes:
      - uptime_data:/app/data
    networks:
      - smk-network

  prometheus:
    image: prom/prometheus:latest
    container_name: smk-prometheus
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - smk-network

  grafana:
    image: grafana/grafana:latest
    container_name: smk-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_SERVER_ROOT_URL: https://monitor.smkdarussalamsubah.sch.id
      GF_INSTALL_PLUGINS: grafana-piechart-panel
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    networks:
      - smk-network
    depends_on:
      - prometheus

  # ─── BACKEND API (NestJS) ─────────────────────────────────────────────────

  api:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    container_name: smk-api
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      DATABASE_URL: postgresql://${POSTGRES_USER:-smk_admin}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-smk_db}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: diis
      KEYCLOAK_CLIENT_ID: diis-api
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_API_CLIENT_SECRET}
      OLLAMA_URL: http://ollama:11434
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      API_PORT: "3001"
      TZ: Asia/Jakarta
    networks:
      - smk-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3001/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── FRONTEND WEB (Next.js) ───────────────────────────────────────────────

  web:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
    container_name: smk-web
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      NEXT_PUBLIC_API_URL: https://api.smkdarussalamsubah.sch.id
      NEXT_PUBLIC_KEYCLOAK_URL: https://auth.smkdarussalamsubah.sch.id
      NEXT_PUBLIC_KEYCLOAK_REALM: diis
      NEXT_PUBLIC_KEYCLOAK_CLIENT_ID: diis-web
    networks:
      - smk-network
    depends_on:
      - api

  # ─── BACKUP OTOMATIS ──────────────────────────────────────────────────────

  pg-backup:
    image: postgres:16-alpine
    container_name: smk-pg-backup
    restart: unless-stopped
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: postgres
      POSTGRES_USER: ${POSTGRES_USER:-diis_admin}
      POSTGRES_DB: ${POSTGRES_DB:-diis_db}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-diis_minio}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      BACKUP_BUCKET: diis-backup
      BACKUP_RETENTION_DAYS: "7"
      TZ: Asia/Jakarta
    volumes:
      - ./scripts/backup.sh:/backup.sh:ro
      - backup_bin:/opt/backup-bin
    # mc client di-download ke named volume agar persistent lintas restart.
    # Cron: 0 19 * * * = 02:00 WIB (UTC+7)
    command:
      - sh
      - -c
      - |
        if [ ! -f /opt/backup-bin/mc ]; then
          echo '[pg-backup] Mengunduh MinIO client (mc)...'
          wget -q -O /opt/backup-bin/mc https://dl.min.io/client/mc/release/linux-amd64/mc
          chmod +x /opt/backup-bin/mc
          echo '[pg-backup] mc siap di /opt/backup-bin/mc'
        fi
        /opt/backup-bin/mc alias set myminio "$$MINIO_ENDPOINT" "$$MINIO_ACCESS_KEY" "$$MINIO_SECRET_KEY" --quiet
        /opt/backup-bin/mc mb --ignore-existing myminio/"$$BACKUP_BUCKET"
        echo "[pg-backup] Bucket '$$BACKUP_BUCKET' siap"
        printenv | grep -E '^(PGPASSWORD|POSTGRES_HOST|POSTGRES_USER|POSTGRES_DB|MINIO_|BACKUP_|TZ)=' > /etc/backup.env
        echo "0 19 * * * . /etc/backup.env && sh /backup.sh >> /var/log/backup.log 2>&1" | crontab -
        echo '[pg-backup] Backup dijadwalkan setiap 02:00 WIB (19:00 UTC). Container siap.'
        crond -f -l 2
    networks:
      - smk-network
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
