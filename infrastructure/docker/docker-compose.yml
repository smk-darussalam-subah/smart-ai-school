# =============================================================================
# Docker Compose — Smart AI School (SMK Darussalam Subah)
# Domain: smkdarussalamsubah.sch.id
# Semua service berjalan dalam Docker network internal
# Hanya Nginx yang terhubung ke internet (port 80/443)
# =============================================================================

networks:
  smk-network:
    driver: bridge
    name: smk-network

volumes:
  postgres_data:
  redis_data:
  keycloak_data:
  n8n_data:
  ollama_data:
  metabase_data:
  uptime_data:
  prometheus_data:
  grafana_data:
  minio_data:
  backup_bin:      # Persistent volume untuk mc binary (agar tidak re-download setiap restart)

services:

  # ─── DATABASE ─────────────────────────────────────────────────────────────

  postgres:
    image: pgvector/pgvector:pg16
    container_name: smk-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-smk_db}
      POSTGRES_USER: ${POSTGRES_USER:-smk_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/01-init-db.sql:ro
      - ./init-staging-db.sh:/docker-entrypoint-initdb.d/02-init-staging-db.sh:ro
    # ports tidak dimapping — aksesibel hanya via Docker network internal.
    # Dev lokal: gunakan docker-compose.dev.yml atau SSH tunnel ke VPS.
    networks:
      - smk-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-smk_admin} -d ${POSTGRES_DB:-smk_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits: { cpus: '2', memory: '2G' }
        reservations: { cpus: '0.5', memory: '512M' }

  # ─── CACHE & QUEUE ────────────────────────────────────────────────────────

  redis:
    image: redis:7-alpine
    container_name: smk-redis
    restart: unless-stopped
    # Password ditulis ke config file saat startup (tidak di command line)
    # $$ escape mencegah Docker Compose ekspansi variabel — shell container yang resolve.
    command: sh -c 'echo "requirepass $${REDIS_PASSWORD}" > /tmp/redis.conf && echo "appendonly yes" >> /tmp/redis.conf && redis-server /tmp/redis.conf'
    environment:
      REDISCLI_AUTH: ${REDIS_PASSWORD}
    # ports tidak dimapping — aksesibel hanya via Docker network internal.
    # Dev lokal: gunakan docker-compose.dev.yml atau SSH tunnel ke VPS.
    volumes:
      - redis_data:/data
    networks:
      - smk-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits: { cpus: '1', memory: '512M' }
        reservations: { cpus: '0.25', memory: '128M' }
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── AUTHENTICATION ───────────────────────────────────────────────────────

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: smk-keycloak
    restart: unless-stopped
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-smk_db}
      KC_DB_USERNAME: ${POSTGRES_USER:-smk_admin}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD}
      KC_DB_SCHEMA: keycloak
      KEYCLOAK_ADMIN: ${KC_ADMIN_USER:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KC_ADMIN_PASSWORD}
      # N-23b: Production mode (start). Sintaks diverifikasi via Keycloak 24.0 source.
      # KC_HOSTNAME wajib di start mode; v1 hostname provider (default di 24.0).
      KC_HOSTNAME: auth.smkdarussalamsubah.sch.id
      # strict=false: izinkan admin console via SSH tunnel (Host: localhost).
      KC_HOSTNAME_STRICT: "false"
      # N-29b: strict-https=true — paksa KC generate https:// untuk semua front-channel URL
      # (CSP frame-src, login-status-iframe, dll). Tanpa ini KC menambah http:// ke
      # frame-src → browser blokir iframe sebagai Mixed Content → admin console spinner.
      # KC_HTTP_ENABLED=true (di bawah) tetap mengizinkan KC listen HTTP di port 8080
      # untuk internal nginx; strict-https hanya mengontrol URL yang KC kirim ke browser.
      KC_HOSTNAME_STRICT_HTTPS: "true"
      KC_HTTP_ENABLED: "true"
      KC_HTTP_PORT: "8080"
      KC_LOG_LEVEL: INFO
      # N-23: Baca X-Forwarded-Proto: https dari nginx → issuer = https://.
      KC_PROXY_HEADERS: xforwarded
      # Single-node VPS: gunakan local cache (bukan Infinispan cluster).
      KC_CACHE: local
    # N-23b: start (production) — tanpa --import-realm.
    # realm-diis.json tetap di repo sebagai sumber, tapi TIDAK auto-import.
    # Auto-import berisiko revert URL prod ke localhost (N-26).
    # Realm diis sudah persist di smk_db.keycloak schema.
    command: start
    ports:
      # N-23b: loopback binding — 8080 tidak accessible dari internet.
      # Admin console: ssh -L 8080:localhost:8080 appuser@103.253.215.19
      - "127.0.0.1:8080:8080"
    volumes:
      - keycloak_data:/opt/keycloak/data
      - ../keycloak:/opt/keycloak/data/import:ro
    networks:
      - smk-network
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      # Keycloak 24 ubi9-micro image tidak punya curl/wget/bash.
      # Gunakan /proc/net/tcp6 untuk verifikasi port 8080 (0x1F90) listening.
      # tcp6 dipakai karena Keycloak 24 default listen di IPv6 stack.
      test: ["CMD-SHELL", "cat /proc/net/tcp6 2>/dev/null | grep -q ':1F90 ' || cat /proc/net/tcp 2>/dev/null | grep -q ':1F90 '"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    deploy:
      resources:
        limits: { cpus: '1', memory: '1G' }
        reservations: { cpus: '0.5', memory: '512M' }

  # ─── AUTOMATION ENGINE ────────────────────────────────────────────────────

  n8n:
    image: n8nio/n8n:latest
    container_name: smk-n8n
    restart: unless-stopped
    environment:
      N8N_HOST: n8n.smkdarussalamsubah.sch.id
      N8N_PORT: 5678
      N8N_PROTOCOL: https
      WEBHOOK_URL: https://n8n.smkdarussalamsubah.sch.id/
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER:-admin}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD}
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB:-smk_db}
      DB_POSTGRESDB_USER: ${POSTGRES_USER:-smk_admin}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_POSTGRESDB_SCHEMA: n8n
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      GENERIC_TIMEZONE: Asia/Jakarta
      TZ: Asia/Jakarta
      # Env vars untuk workflow notifikasi WA (diakses via $env.* di workflow JSON)
      FONNTE_API_KEY: ${FONNTE_API_KEY}
      ADMIN_PHONE_NUMBER: ${ADMIN_PHONE_NUMBER}
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - smk-network
    depends_on:
      postgres:
        condition: service_healthy

  # ─── AI LOKAL ─────────────────────────────────────────────────────────────

  ollama:
    image: ollama/ollama:latest
    container_name: smk-ollama
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - smk-network
    deploy:
      resources:
        limits: { cpus: '3', memory: '6G' }
        reservations: { cpus: '1', memory: '2G' }
    # Uncomment jika VPS punya GPU:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  # ─── ANALYTICS DASHBOARD ──────────────────────────────────────────────────

  metabase:
    image: metabase/metabase:v0.49.10
    container_name: smk-metabase
    restart: unless-stopped
    environment:
      MB_DB_TYPE: postgres
      MB_DB_HOST: postgres
      MB_DB_PORT: 5432
      MB_DB_DBNAME: ${POSTGRES_DB:-smk_db}
      MB_DB_USER: ${POSTGRES_USER:-smk_admin}
      MB_DB_PASS: ${POSTGRES_PASSWORD}
      MB_DB_SCHEMA: metabase
      MB_SITE_URL: https://analytics.smkdarussalamsubah.sch.id
      JAVA_TIMEZONE: Asia/Jakarta
    volumes:
      - metabase_data:/metabase-data
    networks:
      - smk-network
    depends_on:
      postgres:
        condition: service_healthy

  # ─── FILE STORAGE ─────────────────────────────────────────────────────────

  minio:
    image: minio/minio:latest
    container_name: smk-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-smkadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_SITE_NAME: smk-darussalam-subah
    volumes:
      - minio_data:/data
    networks:
      - smk-network

  # ─── MONITORING ───────────────────────────────────────────────────────────

  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: smk-uptime-kuma
    restart: unless-stopped
    volumes:
      - uptime_data:/app/data
    networks:
      - smk-network

  prometheus:
    image: prom/prometheus:latest
    container_name: smk-prometheus
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - smk-network

  grafana:
    image: grafana/grafana:latest
    container_name: smk-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_SERVER_ROOT_URL: https://monitor.smkdarussalamsubah.sch.id
      GF_INSTALL_PLUGINS: grafana-piechart-panel
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    networks:
      - smk-network
    depends_on:
      - prometheus

  # ─── MONITORING EXPORTERS ────────────────────────────────────────────────
  # Metrics exporter untuk Prometheus — diakses internal (tidak ada ports mapping).
  # Dashboard Grafana postgresql.json + redis.json butuh kedua service ini.

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: smk-postgres-exporter
    restart: unless-stopped
    environment:
      # DATABASE_URL sudah URL-encoded (di-patch oleh deploy.yml). Exporter menerima format postgresql://.
      DATA_SOURCE_NAME: ${DATABASE_URL}
    networks:
      - smk-network
    depends_on:
      postgres:
        condition: service_healthy

  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: smk-redis-exporter
    restart: unless-stopped
    environment:
      # REDIS_URL format redis://:pass@host:port — didukung langsung oleh redis-exporter.
      REDIS_ADDR: ${REDIS_URL}
    networks:
      - smk-network
    depends_on:
      - redis

  # ─── BACKEND API (NestJS) ─────────────────────────────────────────────────

  # One-shot container: jalankan Prisma migration sebelum API start.
  # Dipanggil oleh deploy.yml sebagai langkah terpisah.
  # Ini memisahkan hak DDL (CREATE/ALTER) dari runtime API.
  api-migrate:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    container_name: smk-api-migrate
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      DATABASE_URL: ${DATABASE_URL}
      GUARD_STAGING_DB: ${GUARD_STAGING_DB:-0}
    networks:
      - smk-network
    depends_on:
      postgres:
        condition: service_healthy
    # Entrypoint: jalankan migration dengan guardrail N-20.
    entrypoint: ["sh", "-c", "if [ \"$${GUARD_STAGING_DB:-0}\" = \"1\" ]; then _DB=$$(echo $${DATABASE_URL} | sed 's|.*/||' | sed 's|?.*||'); if [ \"$$_DB\" != \"smk_staging_db\" ]; then echo '❌ GUARDRAIL N-20: DATABASE_URL bukan smk_staging_db!' >&2; exit 1; fi; echo '✅ Guardrail N-20 OK'; fi; cd /app/packages/database && /app/node_modules/.bin/prisma migrate deploy"]
    profiles:
      - migrate

  api:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    container_name: smk-api
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      # DATABASE_URL harus di-set di .env dengan password yang sudah URL-encoded.
      # Jangan konstruksi dari ${POSTGRES_PASSWORD} langsung karena jika password
      # mengandung karakter khusus (@, #, !, dll), URL akan corrupt dan Prisma
      # akan parse hostname yang salah (P1001).
      # deploy.yml generate nilai ini otomatis dengan python3 urllib.parse.quote().
      DATABASE_URL: ${DATABASE_URL}
      # REDIS_URL harus di-set di .env dengan password yang sudah URL-encoded.
      # Sama seperti DATABASE_URL — deploy.yml generate nilai ini otomatis.
      REDIS_URL: ${REDIS_URL}
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: diis
      KEYCLOAK_ISSUER: https://auth.smkdarussalamsubah.sch.id/realms/diis
      KEYCLOAK_CLIENT_ID: diis-api
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_API_CLIENT_SECRET}
      OLLAMA_URL: http://ollama:11434
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      API_PORT: "3001"
      TZ: Asia/Jakarta
    networks:
      - smk-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3001/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits: { cpus: '1', memory: '1G' }
        reservations: { cpus: '0.25', memory: '256M' }

  # ─── FRONTEND WEB (Next.js) ───────────────────────────────────────────────

  web:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
    container_name: smk-web
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      NEXT_PUBLIC_API_URL: https://api.smkdarussalamsubah.sch.id
      NEXT_PUBLIC_KEYCLOAK_URL: https://auth.smkdarussalamsubah.sch.id
      NEXT_PUBLIC_KEYCLOAK_REALM: diis
      NEXT_PUBLIC_KEYCLOAK_CLIENT_ID: diis-web
      # Next-Auth server-side (N22) — JANGAN NEXT_PUBLIC_ untuk secret
      NEXTAUTH_URL: https://smkdarussalamsubah.sch.id
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      KEYCLOAK_ISSUER: https://auth.smkdarussalamsubah.sch.id/realms/diis
      KEYCLOAK_CLIENT_ID: diis-web
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_WEB_CLIENT_SECRET}
      API_URL: https://api.smkdarussalamsubah.sch.id
      # N-26: Next.js standalone default bind 127.0.0.1 → tidak terjangkau dari nginx.
      # HOSTNAME=0.0.0.0 memaksa listen di semua interface Docker network.
      HOSTNAME: "0.0.0.0"
      # Metabase embed (SMA-47) — server-side only, JANGAN NEXT_PUBLIC_
      METABASE_SITE_URL: ${METABASE_SITE_URL}
      METABASE_SECRET_KEY: ${METABASE_SECRET_KEY}
      METABASE_DASHBOARD_ID: ${METABASE_DASHBOARD_ID}
    networks:
      - smk-network
    depends_on:
      - api
    deploy:
      resources:
        limits: { cpus: '1', memory: '512M' }
        reservations: { cpus: '0.25', memory: '128M' }

  # ─── BACKUP OTOMATIS ──────────────────────────────────────────────────────

  pg-backup:
    image: postgres:16-alpine
    container_name: smk-pg-backup
    restart: unless-stopped
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: postgres
      POSTGRES_USER: ${POSTGRES_USER:-diis_admin}
      POSTGRES_DB: ${POSTGRES_DB:-diis_db}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-diis_minio}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      BACKUP_BUCKET: diis-backup
      BACKUP_RETENTION_DAYS: "7"
      TZ: Asia/Jakarta
    volumes:
      - ./scripts/backup.sh:/backup.sh:ro
      - backup_bin:/opt/backup-bin
    # mc client di-download ke named volume agar persistent lintas restart.
    # Cron: 0 19 * * * = 02:00 WIB (UTC+7)
    command:
      - sh
      - -c
      - |
        if [ ! -f /opt/backup-bin/mc ]; then
          echo '[pg-backup] Mengunduh MinIO client (mc)...'
          wget -q -O /opt/backup-bin/mc https://dl.min.io/client/mc/release/linux-amd64/mc
          chmod +x /opt/backup-bin/mc
          echo '[pg-backup] mc siap di /opt/backup-bin/mc'
        fi
        /opt/backup-bin/mc alias set myminio "$$MINIO_ENDPOINT" "$$MINIO_ACCESS_KEY" "$$MINIO_SECRET_KEY" --quiet
        /opt/backup-bin/mc mb --ignore-existing myminio/"$$BACKUP_BUCKET"
        echo "[pg-backup] Bucket '$$BACKUP_BUCKET' siap"
        printenv | grep -E '^(PGPASSWORD|POSTGRES_HOST|POSTGRES_USER|POSTGRES_DB|MINIO_|BACKUP_|TZ)=' > /etc/backup.env
        echo "0 19 * * * . /etc/backup.env && sh /backup.sh >> /var/log/backup.log 2>&1" | crontab -
        echo '[pg-backup] Backup dijadwalkan setiap 02:00 WIB (19:00 UTC). Container siap.'
        crond -f -l 2
    networks:
      - smk-network
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started

  # ─── REVERSE PROXY ────────────────────────────────────────────────────────

  nginx:
    image: nginx:alpine
    container_name: smk-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - web
      - api
      - keycloak
      - n8n
      - metabase
      - grafana
      - uptime-kuma
    networks:
      - smk-network
    deploy:
      resources:
        limits: { cpus: '0.5', memory: '256M' }
        reservations: { cpus: '0.25', memory: '64M' }
