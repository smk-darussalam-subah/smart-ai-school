# =============================================================================
# Nginx Reverse Proxy — Smart AI School (SMK Darussalam Subah)
# Semua subdomain diarahkan ke container yang tepat
# SSL dihandle oleh Cloudflare (mode Full Strict)
# =============================================================================

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    # ── Security Headers (global — berlaku untuk semua server block) ─────
    # CSP TIDAK diset di sini (global). Alasan:
    #   - Web app (smkdarussalamsubah.sch.id): CSP diset oleh Next.js middleware
    #     dengan nonce per-request (FIX-T05/SMA-26). Nginx tidak boleh override.
    #   - API (api.*): CSP-nya sendiri di server block bawah.
    #   - Tool internal (Keycloak, Grafana, etc.): mereka manage CSP sendiri.
    # Lihat: apps/web/src/middleware.ts — buildCsp()
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    server_tokens off;

    # ── Cloudflare Real IP ────────────────────────────────────────────────
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 131.0.72.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    real_ip_header CF-Connecting-IP;

    # ── Rate Limiting ─────────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m rate=100r/m;
    limit_req_zone $binary_remote_addr zone=web:10m rate=200r/m;

    # ── Gzip ──────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1000;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # ── TLS — Cloudflare Origin Certificate (N-7) ─────────────────────────
    # Cert di-generate di Cloudflare: SSL/TLS → Origin Server → Create Certificate.
    # File hanya ada di VPS (infrastructure/nginx/certs/). Folder certs/ di-gitignore.
    ssl_certificate     /etc/nginx/certs/origin.pem;
    ssl_certificate_key /etc/nginx/certs/origin.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    # ── Portal Utama (smkdarussalamsubah.sch.id) ──────────────────────────
    server {
        listen 80;
        listen 443 ssl;
        server_name smkdarussalamsubah.sch.id www.smkdarussalamsubah.sch.id;

        location / {
            limit_req zone=web burst=20 nodelay;
            proxy_pass http://web:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_read_timeout 60s;
            # N-25: Next.js set-cookie + CSP nonce header besar → "upstream sent too big header".
            # Buffer diperbesar agar response header dari web tidak memicu 502.
            proxy_buffer_size 128k;
            proxy_buffers 4 256k;
            proxy_busy_buffers_size 256k;
        }
    }

    # ── Backend API (api.smkdarussalamsubah.sch.id) ───────────────────────
    server {
        listen 80;
        listen 443 ssl;
        server_name api.smkdarussalamsubah.sch.id;

        # CSP ketat untuk pure JSON API — tidak perlu resource apapun selain data
        add_header Content-Security-Policy "default-src 'none'; frame-ancestors 'none';" always;

        location / {
            limit_req zone=api burst=50 nodelay;
            proxy_pass http://api:3001;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }
    }

    # ── Keycloak Auth (auth.smkdarussalamsubah.sch.id) ────────────────────
    server {
        listen 80;
        listen 443 ssl;
        server_name auth.smkdarussalamsubah.sch.id;

        location / {
            proxy_pass http://keycloak:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_read_timeout 120s;
            proxy_buffer_size 128k;
            proxy_buffers 4 256k;
        }
    }

    # ── n8n Automation (n8n.smkdarussalamsubah.sch.id) ───────────────────
    server {
        listen 80;
        listen 443 ssl;
        server_name n8n.smkdarussalamsubah.sch.id;

        location / {
            proxy_pass http://n8n:5678;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }

    # ── Analytics Dashboard (analytics.smkdarussalamsubah.sch.id) ─────────
    server {
        listen 80;
        listen 443 ssl;
        server_name analytics.smkdarussalamsubah.sch.id;

        location / {
            proxy_pass http://metabase:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }

    # ── Monitoring (monitor.smkdarussalamsubah.sch.id) ────────────────────
    server {
        listen 80;
        listen 443 ssl;
        server_name monitor.smkdarussalamsubah.sch.id;

        location / {
            proxy_pass http://grafana:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }

    # ── Status/Uptime (status.smkdarussalamsubah.sch.id) ──────────────────
    server {
        listen 80;
        listen 443 ssl;
        server_name status.smkdarussalamsubah.sch.id;

        location / {
            proxy_pass http://uptime-kuma:3001;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
