<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
<meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>DIIS — Dashboard Orang Tua (Mockup)</title>
<script src="https://unpkg.com/lucide@latest"></script>
<script>try{var t=localStorage.getItem('diis-ortu-theme')||'dark';document.documentElement.setAttribute('data-theme',t);}catch(e){}</script>
<style>
:root[data-theme="dark"]{
  --bg:#0a0f1a;--bg2:#0f1626;--surface:rgba(255,255,255,.035);--surface2:rgba(255,255,255,.06);
  --border:rgba(255,255,255,.08);--border2:rgba(255,255,255,.12);
  --text:#e8eef5;--muted:#7a8ba0;--dim:#4a5b70;
  --pri:#3b82f6;--pril:#60a5fa;--prid:#2563eb;--pridd:#1e40af;
  --grad:linear-gradient(135deg,#3b82f6,#1e40af);--grad-v:linear-gradient(135deg,#60a5fa,#3b82f6,#1d4ed8);
  --amber:#f59e0b;--rose:#ef4444;--sky:#0ea5e9;--violet:#a78bfa;--pink:#ec4899;--em:#10b981;
  --sh:0 4px 24px -8px rgba(0,0,0,.5);--shlift:0 8px 40px -12px rgba(0,0,0,.6);
  --r:16px;--r-sm:12px;--r-lg:20px;
  --ring-bg:rgba(255,255,255,.06);--bar-bg:rgba(255,255,255,.06);
  --ovl-bg:rgba(0,0,0,.6);--nav-bg:rgba(10,15,26,.9);--topbar-bg:rgba(10,15,26,.8);
  --glow-bd:rgba(59,130,246,.2);--glow-sh:0 0 0 1px rgba(59,130,246,.1),0 4px 24px -8px rgba(59,130,246,.15);
  --empty-cell:rgba(255,255,255,.02);
}
:root[data-theme="light"]{
  --bg:#f4f6fb;--bg2:#fff;--surface:#fff;--surface2:#eef2f9;
  --border:#e2e8f0;--border2:#cbd5e1;
  --text:#0f1e35;--muted:#64748b;--dim:#94a3b8;
  --pri:#2563eb;--pril:#3b82f6;--prid:#1d4ed8;--pridd:#1e3a8a;
  --grad:linear-gradient(135deg,#2563eb,#1e3a8a);--grad-v:linear-gradient(135deg,#3b82f6,#2563eb,#1d4ed8);
  --amber:#d97706;--rose:#e11d48;--sky:#0284c7;--violet:#7c3aed;--pink:#db2777;--em:#059669;
  --sh:0 1px 2px rgba(15,30,53,.04),0 8px 24px -14px rgba(15,30,53,.14);
  --shlift:0 2px 6px rgba(15,30,53,.06),0 22px 40px -20px rgba(15,30,53,.28);
  --r:16px;--r-sm:12px;--r-lg:20px;
  --ring-bg:#e2e8f0;--bar-bg:#e2e8f0;
  --ovl-bg:rgba(0,0,0,.4);--nav-bg:rgba(255,255,255,.92);--topbar-bg:rgba(244,246,251,.85);
  --glow-bd:rgba(37,99,235,.15);--glow-sh:0 0 0 1px rgba(37,99,235,.08),0 4px 24px -8px rgba(37,99,235,.1);
  --empty-cell:rgba(0,0,0,.02);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:14px;-webkit-font-smoothing:antialiased;overflow-x:hidden}
body::before{content:'';position:fixed;top:-40%;right:-30%;width:80%;height:80%;background:radial-gradient(circle,rgba(59,130,246,.06),transparent 60%);pointer-events:none;z-index:0}
.app{max-width:560px;margin:0 auto;position:relative;z-index:1;min-height:100vh}
/* topbar */
.topbar{position:sticky;top:0;z-index:20;background:var(--topbar-bg);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:0 16px;height:56px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.topbar .brand{display:flex;align-items:center;gap:8px;font-weight:800;font-size:14px}
.topbar .brand .logo{width:30px;height:30px;border-radius:9px;background:var(--grad);display:grid;place-items:center;color:#fff;font-weight:800;font-size:12px}
.topbar .right{display:flex;align-items:center;gap:6px}
.iconbtn{width:36px;height:36px;border-radius:10px;border:1px solid var(--border);background:var(--surface);display:grid;place-items:center;color:var(--text);cursor:pointer;position:relative;transition:.15s}
.iconbtn:hover{background:var(--surface2)}
.iconbtn svg{width:18px;height:18px}
.iconbtn .dot{position:absolute;top:5px;right:5px;width:8px;height:8px;border-radius:50%;background:var(--rose);border:1.5px solid var(--topbar-bg)}
/* child selector */
.child-sel{display:flex;align-items:center;gap:6px;background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:5px 10px;cursor:pointer;transition:.15s}
.child-sel:hover{border-color:var(--pri)}
.child-sel .cs-ava{width:24px;height:24px;border-radius:50%;background:var(--grad);display:grid;place-items:center;font-size:10px;font-weight:800;color:#fff}
.child-sel .cs-name{font-size:12px;font-weight:700;white-space:nowrap}
.child-sel .cs-chev{width:14px;height:14px;color:var(--muted)}
/* screens */
.screen{display:none;padding:16px 16px 90px;animation:fade .25s ease}
.screen.on{display:block}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
/* cards */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:14px;backdrop-filter:blur(12px)}
.card.glow{border-color:var(--glow-bd);box-shadow:var(--glow-sh)}
.card-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.card-h .lbl{display:flex;align-items:center;gap:7px;font-size:12px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.3px}
.card-h .lbl svg{width:15px;height:15px;color:var(--pri)}
.card-h .link{font-size:11px;font-weight:700;color:var(--pril);cursor:pointer;display:flex;align-items:center;gap:3px}
.card-h .link svg{width:13px;height:13px}
/* student card */
.stu-card{background:var(--grad);border-radius:var(--r-lg);padding:18px;color:#fff;position:relative;overflow:hidden;margin-bottom:14px}
.stu-card::after{content:'';position:absolute;top:-30px;right:-30px;width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,.08)}
.stu-card .sc-top{display:flex;align-items:center;gap:12px;position:relative;z-index:1}
.stu-card .sc-ava{width:52px;height:52px;border-radius:50%;background:rgba(255,255,255,.2);border:2px solid rgba(255,255,255,.3);display:grid;place-items:center;font-size:18px;font-weight:800}
.stu-card .sc-info b{font-size:17px;display:block}
.stu-card .sc-info small{font-size:12px;opacity:.85;font-weight:500}
.stu-card .sc-stats{display:flex;gap:12px;margin-top:14px;position:relative;z-index:1}
.stu-card .sc-stat{text-align:center;flex:1}
.stu-card .sc-stat .n{font-size:18px;font-weight:800}
.stu-card .sc-stat .l{font-size:9px;opacity:.75;font-weight:600;text-transform:uppercase;letter-spacing:.3px}
/* ring */
.ring{position:relative;display:inline-block}
.ring .fg-c{stroke:var(--pril);stroke-linecap:round;transition:stroke-dashoffset .5s ease}
.ring .bg-c{stroke:var(--ring-bg)}
.ring .ctr{position:absolute;inset:0;display:grid;place-items:center;text-align:center}
.ring .ctr .n{font-size:20px;font-weight:800;line-height:1}
.ring .ctr .l{font-size:8px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.3px}
/* bars */
.bar{height:6px;border-radius:4px;background:var(--bar-bg);overflow:hidden}
.bar i{display:block;height:100%;border-radius:4px;background:var(--grad-v);transition:width .4s ease}
/* timeline */
.tl-item{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
.tl-item:last-child{border:0}
.tl-item .tl-time{font-size:10px;font-weight:700;color:var(--muted);min-width:80px;text-align:right;padding-top:2px}
.tl-item .tl-body{flex:1;min-width:0}
.tl-item .tl-body .mp{font-size:13px;font-weight:700}
.tl-item .tl-body .meta{font-size:10.5px;color:var(--muted);font-weight:500}
.tl-item .tl-dot{width:8px;height:8px;border-radius:50%;margin-top:6px;flex-shrink:0}
.tl-item.now .tl-dot{box-shadow:0 0 0 3px rgba(59,130,246,.2)}
/* task */
.task-item{display:flex;align-items:center;gap:10px;padding:10px;border:1px solid var(--border);border-radius:var(--r-sm);margin-bottom:8px;cursor:pointer;transition:.15s}
.task-item:hover{border-color:var(--border2);background:var(--surface2)}
.task-item .ti-mp{width:4px;height:36px;border-radius:3px;flex-shrink:0}
.task-item .ti-body{flex:1;min-width:0}
.task-item .ti-body b{font-size:12.5px;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.task-item .ti-body small{font-size:10px;color:var(--muted);font-weight:600}
.task-item .ti-badge{font-size:9px;font-weight:800;padding:3px 8px;border-radius:6px;white-space:nowrap}
.b-pending{background:rgba(245,158,11,.15);color:var(--amber)}
.b-submitted{background:rgba(16,185,129,.15);color:var(--em)}
.b-late{background:rgba(239,68,68,.15);color:var(--rose)}
/* payment item */
.pay-item{display:flex;align-items:center;gap:10px;padding:10px;border:1px solid var(--border);border-radius:var(--r-sm);margin-bottom:8px;cursor:pointer;transition:.15s}
.pay-item:hover{border-color:var(--border2);background:var(--surface2)}
.pay-ic{width:38px;height:38px;border-radius:10px;display:grid;place-items:center;flex-shrink:0}
.pay-ic.paid{background:rgba(16,185,129,.15)}.pay-ic.unpaid{background:rgba(245,158,11,.15)}
.pay-ic svg{width:18px;height:18px}.pay-ic.paid svg{color:var(--em)}.pay-ic.unpaid svg{color:var(--amber)}
.pay-body{flex:1;min-width:0}.pay-body b{font-size:12.5px;display:block}.pay-body small{font-size:10px;color:var(--muted);font-weight:600}
.pay-amt{font-size:14px;font-weight:800;white-space:nowrap}
.seg .cnt{font-size:9px;font-weight:800;background:rgba(255,255,255,.15);padding:1px 5px;border-radius:20px;margin-left:3px}
/* grade row */
.gr-row{display:flex;align-items:center;gap:10px;padding:10px;border:1px solid var(--border);border-radius:var(--r-sm);margin-bottom:8px;cursor:pointer;transition:.15s}
.gr-row:hover{border-color:var(--border2);background:var(--surface2)}
.gr-row .gr-bar{width:4px;height:40px;border-radius:3px;flex-shrink:0}
.gr-row .gr-body{flex:1;min-width:0}
.gr-row .gr-body b{font-size:13px;display:block}
.gr-row .gr-body small{font-size:10px;color:var(--muted);font-weight:600}
.gr-row .gr-val{font-size:18px;font-weight:800;flex-shrink:0}
.gr-row .gr-trend{font-size:11px;font-weight:700;flex-shrink:0;display:flex;align-items:center;gap:2px}
/* badge */
.badge-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.badge-item{text-align:center;padding:10px 4px;border:1px solid var(--border);border-radius:var(--r-sm);background:var(--surface);cursor:pointer;transition:.15s}
.badge-item:hover{border-color:var(--border2);transform:translateY(-2px)}
.badge-item .b-emoji{font-size:22px;line-height:1;margin-bottom:4px}
.badge-item .b-name{font-size:9px;font-weight:700;line-height:1.2}
.badge-item.locked{opacity:.4;filter:grayscale(1)}
/* calendar */
.cal-wrap{padding-bottom:4px;overflow:hidden}
.cal{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:3px;width:100%}
.cal .cal-h{font-size:10px;color:var(--dim);font-weight:800;text-align:center;padding:2px 0}
.cal .cal-cell{aspect-ratio:1;border-radius:5px;display:grid;place-items:center;font-size:11px;font-weight:800;cursor:pointer;transition:.15s}
.cal .cal-cell:hover{transform:scale(1.15);z-index:1}
.cal .cal-cell.hadir{background:rgba(16,185,129,.25);color:var(--em);border:1px solid rgba(16,185,129,.3)}
.cal .cal-cell.izin{background:rgba(14,165,233,.2);color:var(--sky);border:1px solid rgba(14,165,233,.25)}
.cal .cal-cell.sakit{background:rgba(245,158,11,.2);color:var(--amber);border:1px solid rgba(245,158,11,.25)}
.cal .cal-cell.alpha{background:rgba(239,68,68,.2);color:var(--rose);border:1px solid rgba(239,68,68,.25)}
.cal .cal-cell.empty{background:var(--empty-cell);border:1px solid var(--border)}
.cal .cal-cell.today{outline:2px solid var(--pri);outline-offset:-3px}
.cal-legend{display:flex;gap:10px;flex-wrap:wrap;margin-top:10px;justify-content:center}
.cal-legend span{display:flex;align-items:center;gap:4px;font-size:9px;font-weight:600;color:var(--muted)}
.cal-legend i{width:10px;height:10px;border-radius:3px;display:inline-block}
/* WA history */
.wa-item{display:flex;align-items:center;gap:10px;padding:10px;border:1px solid var(--border);border-radius:var(--r-sm);margin-bottom:6px}
.wa-item .wa-ic{width:32px;height:32px;border-radius:8px;display:grid;place-items:center;flex-shrink:0}
.wa-item .wa-ic svg{width:16px;height:16px}
.wa-item .wa-body{flex:1;min-width:0}
.wa-item .wa-body b{font-size:12px;display:block}
.wa-item .wa-body small{font-size:9.5px;color:var(--muted);font-weight:600}
.wa-item .wa-badge{font-size:9px;font-weight:800;padding:2px 7px;border-radius:5px}
/* skill bar */
.skill-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.skill-row .sr-body{flex:1;min-width:0}
.skill-row .sr-body b{font-size:11.5px;display:block}
.skill-row .sr-body .bar{margin-top:4px}
.skill-row .sr-pct{font-size:12px;font-weight:800;color:var(--pril);flex-shrink:0;width:32px;text-align:right}
/* timeline vert */
.cv-timeline{position:relative;padding-left:18px}
.cv-timeline::before{content:'';position:absolute;left:5px;top:4px;bottom:4px;width:2px;background:var(--border2)}
.cv-tl-item{position:relative;padding-bottom:12px}
.cv-tl-item::before{content:'';position:absolute;left:-16px;top:4px;width:10px;height:10px;border-radius:50%;background:var(--pri);border:2px solid var(--bg)}
.cv-tl-item b{font-size:12px;display:block}
.cv-tl-item small{font-size:10px;color:var(--muted);font-weight:600}
.cv-tl-item p{font-size:11px;color:var(--muted);margin-top:2px;line-height:1.4}
/* ranking */
.lb-row{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:10px;margin-bottom:4px}
.lb-row.me{background:rgba(59,130,246,.08);border:1px solid rgba(59,130,246,.2)}
.lb-rank{width:24px;height:24px;border-radius:6px;display:grid;place-items:center;font-size:11px;font-weight:800;flex-shrink:0;background:var(--surface2);color:var(--muted)}
.lb-rank.gold{background:rgba(245,158,11,.15);color:var(--amber)}
.lb-rank.silver{background:rgba(155,163,175,.15);color:#9ca3af}
.lb-rank.bronze{background:rgba(180,83,9,.15);color:#b45309}
.lb-ava{width:28px;height:28px;border-radius:50%;display:grid;place-items:center;font-size:10px;font-weight:800;color:#fff;flex-shrink:0}
.lb-body{flex:1;min-width:0}
.lb-body b{font-size:12px;display:block}
.lb-body small{font-size:9.5px;color:var(--muted);font-weight:600}
.lb-score{font-size:13px;font-weight:800;color:var(--pri);flex-shrink:0}
/* bottom nav */
.bottomnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:560px;z-index:30;background:var(--nav-bg);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-top:1px solid var(--border);display:flex;padding:4px 0 calc(4px + env(safe-area-inset-bottom,0px))}
.bnav{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 0 4px;cursor:pointer;color:var(--muted);font-size:9.5px;font-weight:700;position:relative;transition:.15s}
.bnav svg{width:20px;height:20px}
.bnav.on{color:var(--pril)}
.bnav.on::after{content:'';position:absolute;top:0;left:30%;right:30%;height:2.5px;border-radius:2px;background:var(--pri)}
.bnav .bnav-badge{position:absolute;top:2px;right:calc(50% - 18px);min-width:15px;height:15px;border-radius:8px;background:var(--rose);color:#fff;font-size:8.5px;font-weight:800;display:grid;place-items:center;padding:0 4px}
/* modal */
.ovl{position:fixed;inset:0;z-index:50;background:var(--ovl-bg);backdrop-filter:blur(4px);display:none;align-items:flex-end;justify-content:center}
.ovl.on{display:flex;animation:fade .2s ease}
.sheet{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r-lg) var(--r-lg) 0 0;width:100%;max-width:560px;max-height:85vh;overflow:auto;padding:16px 16px 30px;animation:slideUp .3s cubic-bezier(.22,.61,.36,1)}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sheet-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.sheet-h b{font-size:15px;font-weight:800}
.sheet-h .close{width:30px;height:30px;border-radius:8px;border:1px solid var(--border);background:var(--surface);display:grid;place-items:center;cursor:pointer;color:var(--muted)}
.sheet-h .close svg{width:16px;height:16px}
/* toast */
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--bg2);border:1px solid var(--border2);border-radius:10px;padding:10px 16px;font-size:12px;font-weight:600;z-index:100;box-shadow:var(--shlift);animation:toastIn .3s ease}
@keyframes toastIn{from{opacity:0;transform:translate(-50%,10px)}to{opacity:1;transform:translate(-50%,0)}}
/* misc */
.greet{margin-bottom:14px}
.greet h1{font-size:20px;font-weight:800}
.greet p{font-size:12px;color:var(--muted);font-weight:500;margin-top:2px}
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.stat-card{text-align:center;padding:12px 8px;border:1px solid var(--border);border-radius:var(--r-sm);background:var(--surface)}
.stat-card .n{font-size:18px;font-weight:800;color:var(--pril)}
.stat-card .l{font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.3px;margin-top:2px}
.seg{display:flex;gap:6px;margin-bottom:12px}
.seg button{flex:1;border:1px solid var(--border);background:var(--surface);color:var(--muted);font:inherit;font-size:11px;font-weight:700;padding:8px;border-radius:var(--r-sm);cursor:pointer;transition:.15s}
.seg button.on{background:var(--pri);color:#fff;border-color:var(--pri)}
.empty{text-align:center;padding:24px;color:var(--dim);font-size:12px;font-weight:600}
.feed-box{background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--em);border-radius:8px;padding:10px;margin-top:8px}
.feed-box b{font-size:11px;color:var(--em)}
.feed-box p{font-size:11.5px;color:var(--muted);margin-top:4px;line-height:1.4}
</style>
</head>
<body>
<div class="app">
  <!-- TOPBAR -->
  <div class="topbar">
    <div class="brand">
      <div class="logo">DIIS</div>
      <span>Orang Tua</span>
    </div>
    <div class="right">
      <div class="child-sel" onclick="toggleChildSel()">
        <div class="cs-ava" id="csAva">RP</div>
        <span class="cs-name" id="csName">Rizky</span>
        <svg data-lucide="chevron-down" class="cs-chev"></svg>
      </div>
      <button class="iconbtn" onclick="openPengumuman()" style="position:relative"><svg data-lucide="bell"></svg><span class="dot"></span></button>
      <button class="iconbtn" onclick="toggleTheme()" id="themeBtn"><svg data-lucide="sun"></svg></button>
    </div>
  </div>
  <!-- SCREEN: BERANDA -->
  <div class="screen on" id="screen-beranda">
    <div class="greet"><h1 id="greetTitle">Selamat datang, Ayah!</h1><p id="greetSub">Pantau perkembangan putra Anda</p></div>
    <div id="berandaContent"></div>
  </div>
  <!-- SCREEN: KEHADIRAN -->
  <div class="screen" id="screen-kehadiran">
    <div class="greet"><h1>Kehadiran</h1><p id="attMonthLabel">Rekap bulan ini</p></div>
    <div id="kehadiranContent"></div>
  </div>
  <!-- SCREEN: NILAI -->
  <div class="screen" id="screen-nilai">
    <div class="greet"><h1>Nilai Akademik</h1><p>Progress nilai & rapor</p></div>
    <div id="nilaiContent"></div>
  </div>
  <!-- SCREEN: PEMBAYARAN -->
  <div class="screen" id="screen-pembayaran">
    <div class="greet"><h1>Pembayaran</h1><p>Status SPP & biaya pendidikan</p></div>
    <div class="seg">
      <button class="on" onclick="setPayTab('all',this)">Semua</button>
      <button onclick="setPayTab('unpaid',this)">Belum Bayar <span class="cnt" id="cntUnpaid">0</span></button>
      <button onclick="setPayTab('paid',this)">Lunas <span class="cnt" id="cntPaid">0</span></button>
    </div>
    <div id="pembayaranContent"></div>

function generateCal(){
  const cal=[];const statuses=['hadir','hadir','hadir','hadir','hadir','hadir','hadir','hadir','izin','sakit','alpha','hadir','hadir','hadir'];
  const today=now.getDate();const dim=new Date(now.getFullYear(),now.getMonth()+1,0).getDate();
  const firstDow=new Date(now.getFullYear(),now.getMonth(),1).getDay();
  const offset=firstDow;
  for(let i=0;i<offset;i++)cal.push({day:0,status:'empty'});
  for(let d=1;d<=dim;d++){
    const dow=(d+offset-1)%7;
    if(dow===0){cal.push({day:d,status:'empty'});continue;}
    if(d>today){cal.push({day:d,status:'future'});continue;}
    cal.push({day:d,status:statuses[(d*3+dow)%statuses.length]});
  }
  return cal;
}

  // individual UH scores
  h+=`<div class="card"><div class="card-h"><div class="lbl"><svg data-lucide="file-text"></svg>Detail Ulangan Harian</div></div>`;
  s.uh.forEach((v,i)=>{h+=`<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border)"><span style="font-size:12px;color:var(--muted)">UH ${i+1}</span><span style="font-size:12px;font-weight:700">${v}</span></div>`;});
  h+=`<div style="margin-top:8px;font-size:11px;color:var(--muted);font-weight:600">Praktik: ${s.praktik.join(', ')}</div></div>`;
  document.getElementById('modalBody').innerHTML=h;openM();lucide.createIcons();
}
function openRapor(){
  let h=`<div class="sheet-h"><b>Rapor Semester Genap 2025/2026</b><div class="close" onclick="closeM()"><svg data-lucide="x"></svg></div></div>`;
  h+=`<div class="card" style="padding:0;overflow:hidden"><table style="width:100%;border-collapse:collapse;font-size:12px">`;
  h+=`<thead><tr style="background:var(--surface2)"><th style="padding:10px;text-align:left;font-size:10px;color:var(--muted);text-transform:uppercase">Mapel</th><th style="padding:10px;text-align:center;font-size:10px;color:var(--muted)">NA</th><th style="padding:10px;text-align:center;font-size:10px;color:var(--muted)">Predikat</th><th style="padding:10px;text-align:center;font-size:10px;color:var(--muted)">Status</th></tr></thead><tbody>`;
  NILAI.forEach(n=>{
    const pred=n.na>=90?'A':n.na>=80?'B':n.na>=70?'C':'D';
    const clsV=cls(n.na);
    h+=`<tr style="border-bottom:1px solid var(--border)"><td style="padding:10px;font-weight:600">${n.mp}</td><td style="padding:10px;text-align:center;font-weight:800;font-size:14px;color:${clsV==='ok'?'var(--em)':'var(--rose)'}">${n.na}</td><td style="padding:10px;text-align:center">${pred}</td><td style="padding:10px;text-align:center"><span class="ti-badge ${clsV==='ok'?'b-submitted':'b-late'}">${clsV==='ok'?'Tuntas':'Remedial'}</span></td></tr>`;
  });
  const avg=Math.round(NILAI.reduce((s,n)=>s+n.na,0)/NILAI.length*10)/10;
  h+=`<tr style="background:var(--surface2);font-weight:800"><td style="padding:10px">Rata-rata</td><td style="padding:10px;text-align:center;font-size:15px;color:var(--pri)">${avg}</td><td colspan="2"></td></tr>`;
  h+=`</tbody></table></div>`;
  h+=`<div style="margin-top:12px;padding:12px;border:1px solid var(--border);border-radius:10px;background:var(--surface);font-size:11px;color:var(--muted);line-height:1.5"><b style="color:var(--text)">Catatan Wali Kelas:</b><br>Ananda Rizky menunjukkan progres yang baik. Perlu meningkatkan kedisiplinan dalam pengumpulan tugas tepat waktu. Pertahankan prestasi di Pemrograman Web dan B.Inggris.</div>`;
  h+=`<button style="width:100%;margin-top:12px;padding:12px;border:0;border-radius:12px;background:var(--grad);color:#fff;font-weight:700;font-size:13px;cursor:pointer" onclick="showToast('Rapor diunduh (mockup)')"><svg data-lucide="download" style="width:16px;height:16px;vertical-align:-3px"></svg> Unduh Rapor PDF</button>`;
  document.getElementById('modalBody').innerHTML=h;openM();lucide.createIcons();
}
function openTaskDetail(id){
  const t=TUGAS.find(x=>x.id===id);if(!t)return;const c=mpColor(t.mp);const dd=daysUntil(t.deadline);
  let h=`<div class="sheet-h"><b>${t.judul}</b><div class="close" onclick="closeM()"><svg data-lucide="x"></svg></div></div>`;
  h+=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:12px"><div style="width:4px;height:32px;border-radius:3px;background:${c}"></div><div><b style="font-size:13px">${t.mp}</b><br><small style="font-size:10.5px;color:var(--muted)">${t.guru}</small></div></div>`;
  const bClass=t.status==='pending'?'b-pending':t.status==='submitted'?'b-submitted':'b-late';
  const bText=t.status==='pending'?'Belum Dikerjakan':t.status==='submitted'?'Dikumpulkan':'Terlambat';
  h+=`<div style="display:flex;gap:8px;margin-bottom:12px"><span class="ti-badge ${bClass}" style="font-size:10px;padding:4px 10px">${bText}</span><span style="font-size:10px;font-weight:700;padding:4px 10px;border-radius:6px;background:var(--surface2);color:var(--muted)">Tenggat: ${fmtDate(t.deadline)}</span></div>`;
  h+=`<div class="card" style="margin-bottom:10px"><div class="card-h"><div class="lbl"><svg data-lucide="file-text"></svg>Deskripsi Tugas</div></div><p style="font-size:12px;line-height:1.5;color:var(--text)">${t.desc}</p></div>`;
  if(t.status==='submitted'&&t.feedback){
    h+=`<div class="card"><div class="card-h"><div class="lbl"><svg data-lucide="message-square"></svg>Feedback Guru</div></div><div class="feed-box"><b>Feedback dari ${t.guru.split(',')[0]}:</b><p>${t.feedback}</p></div></div>`;
  }
  // contact teacher
  const teacher=TEACHERS.find(te=>t.guru.includes(te.name.split(',')[0]));
  h+=`<button style="width:100%;margin-top:8px;padding:12px;border:1px solid var(--border);border-radius:12px;background:var(--surface);color:var(--pri);font-weight:700;font-size:13px;cursor:pointer" onclick="closeM();openTeacherContact('${t.mp}')"><svg data-lucide="phone" style="width:16px;height:16px;vertical-align:-3px"></svg> Hubungi Guru Mapel</button>`;
  document.getElementById('modalBody').innerHTML=h;openM();lucide.createIcons();
}
function openPengumuman(){
  let h=`<div class="sheet-h"><b>Pengumuman Sekolah</b><div class="close" onclick="closeM()"><svg data-lucide="x"></svg></div></div>`;
  PENGUMUMAN.forEach(p=>{
    h+=`<div class="card" style="margin-bottom:10px"><div style="display:flex;align-items:center;gap:6px;margin-bottom:6px"><span style="font-size:9px;font-weight:800;padding:2px 8px;border-radius:5px;background:var(--surface2);color:var(--pri)">${p.tag}</span><small style="font-size:10px;color:var(--muted)">${p.date}</small></div><b style="font-size:13px;display:block;margin-bottom:4px">${p.title}</b><p style="font-size:11.5px;color:var(--muted);line-height:1.5">${p.body}</p></div>`;
  });
  document.getElementById('modalBody').innerHTML=h;openM();lucide.createIcons();
}
function openTeacherContact(filterMp){
  let h=`<div class="sheet-h"><b>Hubungi Guru</b><div class="close" onclick="closeM()"><svg data-lucide="x"></svg></div></div>`;
  const list=filterMp?TEACHERS.filter(t=>t.mapel===filterMp):TEACHERS;
  list.forEach(t=>{
    const c=mpColor(t.mapel);
    h+=`<div class="card" style="margin-bottom:10px"><div style="display:flex;align-items:center;gap:10px;margin-bottom:8px"><div style="width:40px;height:40px;border-radius:10px;background:${c};display:grid;place-items:center;color:#fff;font-weight:800;font-size:14px">${ini(t.name)}</div><div style="flex:1"><b style="font-size:13px">${t.name}</b><div style="display:flex;gap:6px;align-items:center;margin-top:2px"><span style="font-size:9px;font-weight:700;padding:2px 6px;border-radius:5px;background:var(--surface2);color:var(--pri)">${t.role}</span><small style="font-size:10px;color:var(--muted)">${t.mapel}</small></div></div></div><div style="display:flex;gap:8px"><a href="tel:${t.phone}" style="flex:1;text-align:center;padding:8px;border:1px solid var(--border);border-radius:8px;font-size:11px;font-weight:700;color:var(--text);text-decoration:none;display:flex;align-items:center;justify-content:center;gap:5px"><svg data-lucide="phone" style="width:14px;height:14px;color:var(--pri)"></svg>Telepon</a><a href="https://wa.me/${t.wa}" style="flex:1;text-align:center;padding:8px;border:0;border-radius:8px;background:#25D366;color:#fff;font-size:11px;font-weight:700;text-decoration:none;display:flex;align-items:center;justify-content:center;gap:5px"><svg data-lucide="message-circle" style="width:14px;height:14px"></svg>WhatsApp</a></div></div>`;
  });
  document.getElementById('modalBody').innerHTML=h;openM();lucide.createIcons();
}
function showToast(msg){const t=document.createElement('div');t.className='toast';t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),3000);}
// ═══ INIT ═══
const _savedTheme=document.documentElement.getAttribute('data-theme')||'dark';
const _tBtn=document.getElementById('themeBtn');
if(_tBtn)_tBtn.innerHTML=`<svg data-lucide="${_savedTheme==='dark'?'sun':'moon'}"></svg>`;
renderBeranda();renderKehadiran();renderNilai();renderPembayaran();renderCapaian();lucide.createIcons();
</script>
